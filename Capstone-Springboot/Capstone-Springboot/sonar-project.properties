# SonarQube Configuration for Capstone Event Booking Project
# Minimal configuration as requested - no new logic changes

# Project identification
sonar.projectKey=capstone-event-booking
sonar.projectName=Capstone Event Booking
sonar.projectVersion=1.0

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.libraries=target/**/*.jar

# Language
sonar.language=java
sonar.sourceEncoding=UTF-8

# Test coverage (using JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/jacoco-report/jacoco.xml
sonar.java.coveragePlugin=jacoco

# Exclusions
sonar.exclusions=**/test/**,**/*Test.java
sonar.test.exclusions=**/test/resources/**

# Quality Gate
sonar.qualitygate.wait=true