spring.application.name=Capstone-Springboot

# Database configuration - using environment variables with defaults for development
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/capstone_improved}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT configuration - using environment variables with defaults for development
jwt.secret=${JWT_SECRET:6f0e5d4412d5f3a0b6194c27b6f8a0ecbaf1942e22cc04f5774d1b1c2f2a4b7d}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Rate limiting configuration
rate.limit.auth.requests=${RATE_LIMIT_AUTH_REQUESTS:10}
rate.limit.api.requests=${RATE_LIMIT_API_REQUESTS:100}